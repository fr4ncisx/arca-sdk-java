name: Security Scan

on:
  schedule:
    - cron: '0 2 * * *' # Nightly at 2:00 AM UTC
  workflow_dispatch: # On-demand manual trigger

permissions:
  contents: read

jobs:
  security-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Get Year-Week for Cache Key
        id: get-date
        run: echo "date=$(date +'%Y-W%V')" >> $GITHUB_OUTPUT

      - name: Cache OWASP Dependency Check Database
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Run OWASP Dependency Scan
        run: mvn dependency-check:check -Psecurity-scan --batch-mode --no-transfer-progress
